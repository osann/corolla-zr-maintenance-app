name: Daily price scrape

on:
  schedule:
    - cron: '0 23 * * *'  # 9 AM AEST (UTC+10)
  workflow_dispatch:       # allow manual trigger from GitHub Actions tab

permissions:
  contents: write          # needed to commit prices.json

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: backend
        run: npx playwright install chromium --with-deps

      - name: Run price scraper
        working-directory: backend
        run: node --import tsx/esm src/scrapers/export-prices.ts

      - name: Commit prices.json if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prices.json
          if git diff --staged --quiet; then
            echo "No price changes — skipping commit"
          else
            git commit -m "chore: update prices.json [skip ci]"
            git push
          fi
